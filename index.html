<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilno Pranje</title>

<link rel="stylesheet" href="style.css?v=1001">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</head>

<body>

<nav class="nav">
  <div class="nav_inner">
    <a href="#home" class="brand">MobilnoPranje</a>

    <div class="nav_links">
      <a href="#prices">Cene</a>
      <a href="#booking" class="nav_cta">Zakazivanje</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero__overlay"></div>

  <div class="hero__content">
    <div class="pill">Beograd • 17:00 – 22:00 • Nedelja radi</div>

    <h1>Mobilno pranje vozila na tvojoj adresi</h1>
    <p>Izaberi paket, datum i vreme — pošalji zahtev.</p>

    <div class="hero__actions">
      <a href="#booking" class="btn btn--primary">Zakaži</a>
      <a href="#prices" class="btn">Cene</a>
    </div>
  </div>
</section>

<!-- CENE -->
<section id="prices" class="section">
  <h2>Cene</h2>

  <div class="grid3">

    <div class="card" data-package="60">
      <h3>Basic</h3>
      <p>30€ • 60 min</p>
    </div>

    <div class="card" data-package="90">
      <h3>Standard</h3>
      <p>70€ • 90 min</p>
    </div>

    <div class="card" data-package="120">
      <h3>Premium</h3>
      <p>100€ • 120 min</p>
    </div>

  </div>
</section>

<!-- BOOKING -->
<section id="booking" class="section booking">
  <h2>Zakazivanje</h2>

  <select id="package">
    <option value="60">Basic (60 min)</option>
    <option value="90">Standard (90 min)</option>
    <option value="120">Premium (120 min)</option>
  </select>

  <input type="text" id="phone" placeholder="Unesi telefon">

  <button id="send">Pošalji zahtev</button>

  <p id="status"></p>
</section>

<script src="script.js?v=1001"></script>

</body>
</html>
