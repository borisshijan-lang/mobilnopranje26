<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Booking sistem</title>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Linkovanje CSS-a direktno ili internal -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav"> <!-- tvoj nav meni -->
  <a href="#booking">Zakazi termin</a>
</div>

<div class="hero">
  <h1>Dobrodošli!</h1>
  <p>Izaberi paket i termin.</p>
</div>

<!-- Booking sekcija -->
<section id="booking" class="section">
  <div id="focusOverlay"></div>
  <div class="panel">
    <h2>Zakazi termin</h2>

    <label>Izaberi paket:
      <select id="pkg">
        <option value="30" selected>Mini paket</option>
        <option value="45">Standard paket</option>
        <option value="60">Premium paket</option>
      </select>
    </label>

    <div id="calTitle" class="calendar-title"></div>
    <div id="dow" class="calendar-dow"></div>
    <div id="calGrid" class="calendar-grid"></div>

    <div id="slots" class="slotsBox">
      Izaberi datum da vidiš slobodne termine.
    </div>

    <label>Telefon: <input id="phone" type="text" placeholder="+381..."></label>

    <div class="summaryBox">
      <div>Datum: <span id="sumDate">—</span></div>
      <div>Vreme: <span id="sumTime">—</span></div>
      <div>Paket: <span id="sumPkg">—</span></div>
    </div>

    <div id="slotsMeta">—</div>

    <div class="buttons">
      <button id="sendReq" class="btn btn--primary">Pošalji zahtev</button>
      <button id="reset" class="btn btn--ghost">Reset</button>
    </div>

    <div id="statusLine"></div>
  </div>
</section>

<!-- JS skripta -->
<script src="booking.js"></script>
</body>
</html>
